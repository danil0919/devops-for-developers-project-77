domain_name: cheap-domen-for-devops-education.asia

postgres_db: focalboard
postgres_user: boards

postgres_container_name: postgres
postgres_image: postgres:15

focalboard_container_name: focalboard
focalboard_image: mattermost/focalboard:latest

focalboard_port: 8000
postgres_port: 5432

postgres_data_dir: /opt/postgres-data
focalboard_data_dir: /opt/focalboard-data
datadog_site: datadoghq.eu
datadog_checks:
      http_check:
        init_config: {}
        instances:
          - name: focalboard-local
            url: "http://127.0.0.1:8000/"
            timeout: 5