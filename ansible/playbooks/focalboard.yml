---
- name: Setup Focalboard
  hosts: focalboard
  become: true

  tasks:
    - name: Install required apt packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        update_cache: true
        state: present

    - name: Create Docker apt keyring directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker GPG key
      ansible.builtin.shell: |
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/docker.list
        content: |
          deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu jammy stable
        mode: "0644"

    - name: Install Docker
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        update_cache: true
        state: present

    - name: Ensure docker service is enabled
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: Create focalboard data directory
      ansible.builtin.file:
        path: "{{ focalboard_data_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Remove existing focalboard container if present
      community.docker.docker_container:
        name: "{{ focalboard_container_name }}"
        state: absent

    - name: Run focalboard container
      community.docker.docker_container:
        name: "{{ focalboard_container_name }}"
        image: "{{ focalboard_image }}"
        state: started
        restart_policy: unless-stopped
        published_ports:
          - "{{ focalboard_port }}:8000"
        env:
          VIRTUAL_HOST: "{{ domain_name }}"
        volumes:
          - "{{ focalboard_data_dir }}:/opt/focalboard/data"
        command: >
          /opt/focalboard/bin/focalboard-server
          --port=8000
          --dbtype=postgres
          --dbconfig=postgres://{{ postgres_user }}:{{ postgres_password }}@{{ postgres_host }}:5432/{{ postgres_db }}?sslmode=disable