---
- name: Setup Focalboard
  hosts: focalboard
  become: true

  vars:
    postgres_host: "{{ postgres_private_ip }}"

  tasks:
    - name: Install Docker
      ansible.builtin.include_tasks: tasks/install_docker.yml

    - name: Create focalboard data directory
      ansible.builtin.file:
        path: "{{ focalboard_data_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Remove existing focalboard container if present
      community.docker.docker_container:
        name: "{{ focalboard_container_name }}"
        state: absent

    - name: Run focalboard container
      community.docker.docker_container:
        name: "{{ focalboard_container_name }}"
        image: "{{ focalboard_image }}"
        state: started
        restart_policy: unless-stopped
        published_ports:
          - "{{ focalboard_port }}:8000"
        env:
          VIRTUAL_HOST: "{{ domain_name }}"
        volumes:
          - "{{ focalboard_data_dir }}:/opt/focalboard/data"
        command: >
          /opt/focalboard/bin/focalboard-server
          --port=8000
          --dbtype=postgres
          --dbconfig=postgres://{{ postgres_user }}:{{ postgres_password }}@{{ postgres_host }}:5432/{{ postgres_db }}?sslmode=disable